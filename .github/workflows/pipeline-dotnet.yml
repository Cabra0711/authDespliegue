name: Deploy production

on:
  push:
    branches:
      - master

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Set lower case repository name
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          # Modificado para usar la variable en minúscula $IMAGE_NAME
          docker build -f Dockerfile -t ghcr.io/$IMAGE_NAME:latest .
          docker push ghcr.io/$IMAGE_NAME:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: 161.97.136.42
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "Conexión exitosa al VPS"

            # 1. Creamos las variables limpias en minúsculas dentro del VPS
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            CONTAINER_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
            
            # 2. Login usando la variable dinámica de contexto de GitHub
            docker login ghcr.io -u "${{ github.actor }}" -p ${{ secrets.GITHUB_TOKEN }} 
            
            # 3. Descarga y despliegue usando EXCLUSIVAMENTE las variables en minúsculas ($)
            docker pull ghcr.io/$REPO_LOWER:latest
            
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d --name $CONTAINER_NAME \
                         -p 8084:8080 \
                         ghcr.io/$REPO_LOWER:latest
